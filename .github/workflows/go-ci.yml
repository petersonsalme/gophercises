name: Go CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.26'
        
    - name: Install Vulnerability Checker
      run: go install golang.org/x/vuln/cmd/govulncheck@latest

    - name: Run Tests, Vet, and Vulncheck
      run: |
        for dir in */; do
          if [ -f "$dir/go.mod" ]; then
            echo "========================================"
            echo "Processing module: $dir"
            echo "========================================"
            cd "$dir"
            go mod download
            go test -v ./...
            go vet ./...
            govulncheck ./...
            cd ..
          fi
        done
